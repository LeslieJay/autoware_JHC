# Multiple goal points configuration for set_goal_node
# The node will navigate to each goal sequentially, waiting at each point



set_goal_node:
  ros__parameters:
    frame_id: 'map'
    allow_goal_modification: true
    loop: false  # Set to true to loop through goals continuously

    # List of goal names (executed in order)
    goal_names: ['A', 'B']

    # Goal A configuration
    ### 单向-双车道
    goals:
      A:
        x: 12.74484634399414
        y: 214.78298950195312
        z: 2.7753277658298336
        orientation_x: 0.0
        orientation_y: 0.0
        orientation_z: -0.6680717263004464
        orientation_w: 0.7440968811370878
        wait_time: 5.0  # Wait 5 seconds after arriving at A

      ### 单向-单车道
      # A:
      #   x: 31.57391929626465
      #   y: -175.38174438476562
      #   z: 4.09387811227483
      #   orientation_x: 0.0
      #   orientation_y: 0.0
      #   orientation_z: -0.6907310465020616
      #   orientation_w: 0.7231117627297781

      # Goal B configuration
      B:
        x: 26.597553253173828
        y: -109.46676635742188
        z: 1.8045642558059183
        orientation_x: 0.0
        orientation_y: 0.0
        orientation_z: -0.6943392302947234
        orientation_w: 0.7196478536574198
        wait_time: 5.0  # Wait 5 seconds after arriving at B
